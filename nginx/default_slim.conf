upstream app {
	server app:8000;
}

server {
	listen 80;
	server_name localhost;

	# Compress JSON instead of serving raw 70MB+ responses.
	gzip on;
	gzip_vary on;
	gzip_proxied any;
	gzip_types application/json text/plain text/css application/javascript;
	gzip_min_length 512;

	# Large static twins payload: serve from the data volume (same path as Django ASTRODASH_DATA_DIR) with caching.
	# Requires astrodash-data mounted at /mnt/astrodash-data on the nginx container.
	location /astrodash/classify/twins/data/ {
		rewrite ^/astrodash/classify/twins/data/?$ /dash_twins_payload.json break;
		root /mnt/astrodash-data/explorer;
		default_type application/json;
		add_header Cache-Control "public, max-age=86400";
	}

	location /oidc {
		proxy_pass http://app/oidc;
		# Set `proxy_set_header Host` so that the OIDC callback will look like 
		# http://localhost:${API_PROXY_PORT} in the case of local development
		proxy_set_header Host $host:4000 ;
	}

	location /(.+)$  {
		proxy_pass http://app/$1;
	}

	location / {
		proxy_pass http://app/;
		rewrite ^/$ /static/index.html last;
	}

	location /static/ {
		alias /static/;
	}

}
