name: astrodash-dev

networks:
  internal:
    external: false

volumes:
  astrodash-db: {}
  django-static: {}
  astrodash-data: {}

services:

  nginx:
    extends:
      file: docker-compose.yml
      service: nginx
    ports:
      - 127.0.0.1:4000:${WEB_SERVER_PORT}
    env_file:
      - ../env/.env.default
      - ../env/.env.dev
    volumes:
      - django-static:/static
      - ../nginx/default_slim.conf:/etc/nginx/conf.d/default.conf
      - astrodash-data:/mnt/astrodash-data:ro

  app:
    extends:
      file: docker-compose.yml
      service: app
    build:
      context: ../app/
    ports:
      - 127.0.0.1:8000:${WEB_APP_PORT}
    environment:
      - "DEV_MODE=1"
      - "ASTRO_DASH_CORS_ALLOWED_ORIGINS=*"
      - "ASTRODASH_LOG_LEVEL=DEBUG"
    env_file:
      - ../env/.env.default
      - ../env/.env.dev
    volumes:
      - django-static:/app/static
      - ../app:/app
      - astrodash-data:/mnt/astrodash-data

  database:
    extends:
      file: docker-compose.yml
      service: database
    env_file:
      - ../env/.env.default
      - ../env/.env.dev

  celery-worker:
    extends:
      file: docker-compose.yml
      service: celery-worker
    build:
      context: ../app/
    env_file:
      - ../env/.env.default
      - ../env/.env.dev
    volumes:
      - django-static:/app/static
      - ../app:/app
      - astrodash-data:/mnt/astrodash-data

  celery-beat:
    extends:
      file: docker-compose.yml
      service: celery-beat
    build:
      context: ../app/
    env_file:
      - ../env/.env.default
      - ../env/.env.dev
    volumes:
      - django-static:/app/static
      - ../app:/app
      - astrodash-data:/mnt/astrodash-data

  redis:
    extends:
      file: docker-compose.yml
      service: redis
    env_file:
      - ../env/.env.default
      - ../env/.env.dev

  flower:
    extends:
      file: docker-compose.yml
      service: flower
    build:
      context: ../app/
    env_file:
      - ../env/.env.default
      - ../env/.env.dev
    volumes:
      - django-static:/app/static
      - ../app:/app
      - astrodash-data:/mnt/astrodash-data
