name: astrodash-base

networks:
  internal:
    external: false

volumes:
  astrodash-db: {}
  django-static: {}
  astrodash-data: {}

services:
  nginx:
    image: nginx:1.21-alpine
    restart: always
    depends_on:
      - app
    networks:
      - internal
    volumes:
      - django-static:/static
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
      - astrodash-data:/mnt/astrodash-data:ro
    profiles:
      - "full_prod"
      - "slim_prod"
      - "full_dev"
      - "slim_dev"

  app:
    image: ${ASTRODASH_IMAGE:-astrodash:latest}
    command: bash entrypoints/docker-entrypoint.app.sh
    networks:
      internal:
        aliases:
          - ${WEB_APP_HOST}
    volumes:
      - django-static:/app/static
      - astrodash-data:/mnt/astrodash-data
    profiles:
      - "full_prod"
      - "slim_prod"
      - "full_dev"
      - "slim_dev"
      - "ci"

  database:
    image: postgres:16
    platform: linux/x86_64
    restart: always
    volumes:
      - astrodash-db:/var/lib/postgresql/data
    networks:
      internal:
        aliases:
          - ${DB_HOST}
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    profiles:
      - "full_prod"
      - "slim_prod"
      - "full_dev"
      - "slim_dev"
      - "ci"

  celery-worker:
    image: ${ASTRODASH_IMAGE:-astrodash:latest}
    command: bash entrypoints/docker-entrypoint.celery.sh
    networks:
      - internal
    deploy:
      mode: replicated
      replicas: 2
      resources:
        reservations:
          cpus: '0.25'
          memory: 1G
        limits:
          cpus: "${CELERY_WORKER_LIMIT_CPUS:-4.0}"
          memory: ${CELERY_WORKER_LIMIT_MEMORY:-4G}
    volumes:
      - django-static:/app/static
      - astrodash-data:/mnt/astrodash-data
    profiles:
      - "full_prod"
      - "full_dev"

  celery-beat:
    image: ${ASTRODASH_IMAGE:-astrodash:latest}
    command: bash entrypoints/docker-entrypoint.celery_beat.sh
    networks:
      - internal
    volumes:
      - django-static:/app/static
      - astrodash-data:/mnt/astrodash-data
    profiles:
      - "full_prod"
      - "full_dev"

  redis:
    image: redis:alpine
    restart: always
    ports:
      - 127.0.0.1:${REDIS_PORT:-6379}:6379
    networks:
      - internal
    profiles:
      - "full_prod"
      - "full_dev"
      - "ci"

  flower:
    image: ${ASTRODASH_IMAGE:-astrodash:latest}
    command: bash entrypoints/docker-entrypoint.flower.sh
    networks:
      - internal
    ports:
      - 127.0.0.1:8888:${FLOWER_PORT}
    profiles:
      - "full_prod"
      - "full_dev"
